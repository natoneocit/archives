<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/css/XP.css">
    <link rel="stylesheet" href="/css/games.css">
	<script src="/js/swfobject.js"></script>
<style> 

		html, body { height:100%; overflow:hidden; }
		body { margin:0; }

div[style="text-align:center;font-size:11px;font-family:arial;background-color:black;color:white"]{display:none} 
div[style="text-align:center;font-size:11px"]{display:none;} 
div[style="position: fixed; text-align: center; width: auto; height: auto; max-width:100%; z-index: 9999; top: 10px;"]{display:none;} 
</style>
	<script>
		var flashvars = {
		};
		var params = {
			menu: "false",
			scale: "noScale",
			allowFullscreen: "true",
			allowScriptAccess: "always",
			bgcolor: "",
			wmode: "direct" // can cause issues with FP settings & webcam
		};
		var attributes = {
			id:"movie"
		};
		swfobject.embedSWF(
			"https://raw.githubusercontent.com/kzzq/kzzq.github.io/refs/heads/main/for-natively/flashgames/Minecraft_Tower_Defense.swf", 
			"altContent", "100%", "100%", "10.0.0", 
			"https://kzzq.github.io/for-natively/flashgames/expressInstall.swf", 
			flashvars, params, attributes);
	</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | Minecraft Tower Defense (Flash)</title>
</head>
<body class="game">
	<div id="altContent">
          <div class="window flashWarning">
            <div class="title-bar">
              <div class="title-bar-text" data-key="window_warning_title"></div>
