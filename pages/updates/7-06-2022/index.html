<!DOCTYPE html>
<html>
<head>
  <title>natively</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="https://unpkg.com/xp.css" />
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/taskbar.css">
</head>
<body>

<body style="background-color:black;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<center><header><img src="/images/logo.png" alt="natively"></header>

      <section id="desktop">
	<div id="taskbar">
		<div class="background sliced vertical">
			<div class="row top"></div>
			<div class="row middle"></div>
			<div class="row bottom"></div>
		</div>
		<div id="start-button">
			<div class="container">
				<div class="background sliced">
					<div class="column left">
						<div class="row top"></div>
						<div class="row middle"></div>
						<div class="row bottom"></div>
					</div>
					<div class="column middle">
						<div class="row top"></div>
						<div class="row middle"></div>
						<div class="row bottom"></div>
					</div>
					<div class="column right">
						<div class="row top"></div>
						<div class="row middle"></div>
						<div class="row bottom"></div>
					</div>
				</div>
				<div class="content">
					<span class="icon"><img src="https://raw.githubusercontent.com/tdcosta100/WindowsXP/master/images/System/WindowsLogo-small.png" /></span>
					<span class="text">start</span>
				</div>
				<div class="overlay" title="start"></div>
			</div>
		</div>
		<div id="task-band">
		</div>
		<div id="tray-notify">
			<div class="container">
				<div class="background sliced">
					<div class="column left">
						<div class="row top"></div>
						<div class="row middle"></div>
						<div class="row bottom"></div>
					</div>
					<div class="column middle">
						<div class="row top"></div>
						<div class="row middle"></div>
						<div class="row bottom"></div>
					</div>
					<div class="column right">
						<div class="row top"></div>
						<div class="row middle"></div>
						<div class="row bottom"></div>
					</div>
				</div>
				<div class="content">
					<div class="clock">
						<div class="text">0:00</div>
						<div class="overlay" title="0:00"></div>
					</div>
				</div>
			</div>
		</div>
	</div>
	
<div class="window" style="width: 320px">
  <div class="title-bar">
    <div class="title-bar-text">
    7/06/2022
    </div>
            <div class="title-bar-controls">
        <button aria-label="Close" onclick="document.location='/updates'"></button>
        </div>
  </div>
  <div class="window-body">
<ul>
    <li><a href="/pages/notepad">/pages/notepad</a></li>
    <li><a href="/pages/screensavers">/pages/screensavers</a></li>
    <li><a href="/pages/credits">/pages/credits</a></li>
</ul>
  </div>
</div></center>
</body>
</html>
