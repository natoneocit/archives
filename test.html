<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Title Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #iframeTitleDisplay {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="iframeTitleDisplay">Iframe Title: Not Loaded Yet</div>
    <iframe id="myIframe" src="http://127.0.0.1:5500" width="600" height="400"></iframe>

    <script>
        $(document).ready(function() {
            // Create a div to display the iframe title
            let titleDisplay = $('#iframeTitleDisplay');

            // Function to update the title display
            function updateIframeTitle() {
                // Try to get the title attribute
                let title = $('#myIframe').attr('title') || 'No title set';
                titleDisplay.text('Iframe Title: ' + title);
            }

            // Update title when the iframe loads
            $('#myIframe').on('load', updateIframeTitle);
            
            // Also update when switching back to the page
            $(window).on('focus', updateIframeTitle);
        });
    </script>

</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</html>
